name: e2e
on:
  workflow_dispatch:
    inputs:
      scenarios:
        description: "scenarios to run (empty = all automated)"
        required: false
        default: ""
  push:
    tags: ["v*"]

jobs:
  adversarial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: engine/go.sum
      - name: install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: adversarial E2E (release gate, 09 §2)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          test -n "$ANTHROPIC_API_KEY" || { echo "::error::ANTHROPIC_API_KEY secret required for E2E"; exit 1; }
          sh e2e/run.sh ${{ github.event.inputs.scenarios }}
      - name: manual-scenarios reminder
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "::warning::Release gate second half — run e2e/MANUAL.md (adopt-resume, compaction soak) before publishing."
